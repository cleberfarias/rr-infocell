name: NextAssist Site — Deploy

on:
  push:
    branches: [main]
    paths:
      - "nextassist-site/**"
      - ".github/workflows/nextassist-deploy.yml"

jobs:
  deploy:
    name: Build e Deploy → Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nextassist-site/package-lock.json

      - name: Install dependencies
        working-directory: nextassist-site
        run: npm ci

      - name: Build (static export)
        working-directory: nextassist-site
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RR_INFOCELL }}
          channelId: live
          projectId: rr-infocell
          entryPoint: nextassist-site
