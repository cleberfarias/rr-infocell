name: NextAssist Site — Deploy

on:
  push:
    branches: [main]
    paths:
      - "nextassist-site/**"
      - ".github/workflows/nextassist-deploy.yml"

jobs:
  deploy:
    name: Build e Deploy → Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: rr-infocell

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy nextassist-site \
            --project rr-infocell \
            --region southamerica-east1 \
            --source nextassist-site/ \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "API_URL=https://rr-infocell-api-1016213438985.southamerica-east1.run.app" \
            --set-env-vars "NEXT_PUBLIC_API_URL=https://rr-infocell-api-1016213438985.southamerica-east1.run.app" \
            --port 3000 \
            --min-instances 0 \
            --max-instances 2 \
            --quiet

      - name: Show Cloud Run URL
        run: |
          URL=$(gcloud run services describe nextassist-site \
            --region southamerica-east1 \
            --format 'value(status.url)')
          echo "✅ NextAssist Site deployed: $URL"

      - name: Deploy Firebase Hosting (rewrite → Cloud Run)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RR_INFOCELL }}
          channelId: live
          projectId: rr-infocell
          entryPoint: nextassist-site
