name: NextAssist Site - Deploy

on:
  push:
    branches: [main]
    paths:
      - "nextassist-site/**"
      - ".github/workflows/nextassist-deploy.yml"

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: rr-infocell

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy nextassist-site \
            --project rr-infocell \
            --region southamerica-east1 \
            --source nextassist-site/ \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "API_URL=https://rr-infocell-api-91248386036.southamerica-east1.run.app" \
            --set-env-vars "NEXT_PUBLIC_API_URL=https://rr-infocell-api-91248386036.southamerica-east1.run.app" \
            --set-env-vars "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" \
            --port 3000 \
            --min-instances 0 \
            --max-instances 2 \
            --quiet

      - name: Show Cloud Run URL
        run: |
          URL=$(gcloud run services describe nextassist-site \
            --region southamerica-east1 \
            --format 'value(status.url)')
          echo "NextAssist Site deployed: $URL"

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RR_INFOCELL }}

      - name: Deploy Firebase Hosting rewrite to Cloud Run
        working-directory: nextassist-site
        run: |
          set +e
          npx firebase-tools@15.22.3 deploy \
            --only hosting \
            --project rr-infocell \
            --non-interactive 2>&1 | tee "$RUNNER_TEMP/firebase-hosting-nextassist-site.log"
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            if grep -q "is the current active version" "$RUNNER_TEMP/firebase-hosting-nextassist-site.log"; then
              echo "::warning::Firebase Hosting reported the deployed version is already active; treating deploy as successful."
            else
              exit "$status"
            fi
          fi
