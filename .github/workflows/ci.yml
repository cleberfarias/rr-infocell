name: CI / CD # nextassist.web.app site criado

on:
  push:
    branches: [main, TECH-V2]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"

jobs:
  # ── Backend: lint + typecheck + tests ──────────────────────────────────
  backend:
    name: Backend — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 3334

  # ── Frontend: typecheck + build ────────────────────────────────────────
  frontend:
    name: Frontend — typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:3333/api' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'ci-placeholder' }}
          VITE_FIREBASE_AUTH_DOMAIN: rr-infocell.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: rr-infocell
          VITE_FIREBASE_STORAGE_BUCKET: rr-infocell.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || 'ci-placeholder' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || 'ci-placeholder' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Deploy Backend → Cloud Run (apenas na main) ────────────────────────
  deploy-backend:
    name: Deploy Backend → Cloud Run
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: rr-infocell

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy rr-infocell-api \
            --project rr-infocell \
            --region southamerica-east1 \
            --source backend/ \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "FIREBASE_PROJECT_ID=rr-infocell" \
            --set-env-vars "CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}" \
            --set-env-vars "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-env-vars "ATENDIMENTO_LEMBRETE_ORCAMENTO_HORAS=24" \
            --set-env-vars "ATENDIMENTO_LEMBRETE_RETIRADA_DIAS=2" \
            --set-env-vars "ATENDIMENTO_AUTOARQUIVAR_DIAS=7" \
            --set-env-vars "FIREBASE_WEB_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" \
            --min-instances 1 \
            --max-instances 1 \
            --quiet

      - name: Show Cloud Run URL
        run: |
          URL=$(gcloud run services describe rr-infocell-api \
            --region southamerica-east1 \
            --format 'value(status.url)')
          echo "✅ Backend deployed: $URL"
          echo "CLOUD_RUN_URL=$URL" >> $GITHUB_ENV

  # ── Deploy Frontend → Firebase Hosting (apenas na main) ───────────────
  deploy-frontend:
    name: Deploy Frontend → Firebase Hosting
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy → rr-infocell.web.app
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RR_INFOCELL }}
          channelId: live
          projectId: rr-infocell
          target: rr-infocell

      - name: Deploy → nextassist.web.app
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RR_INFOCELL }}
          channelId: live
          projectId: rr-infocell
          target: nextassist

